apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: healthbridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: docker-ai-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3007
          env:
            - name: PORT
              value: "3007"
            - name: NODE_ENV
              value: "production"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: healthbridge-secrets
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthbridge-secrets
                  key: JWT_SECRET
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: healthbridge-secrets
                  key: GROQ_API_KEY
            - name: AI_MODEL
              value: "llama-3.1-8b-instant"
          livenessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 10