server {
    listen 80;
    server_name localhost;

    # Where the React build files are stored inside the container
    root /usr/share/nginx/html;
    index index.html index.htm;

    # ==========================================
    # 1. API Reverse Proxy
    # ==========================================
    # Any request starting with /api/ gets forwarded to the Gateway container
    location /api/ {
        # 'api-gateway' must match the service name in your docker-compose.yml
        proxy_pass http://api-gateway:3000;
        
        # Standard proxy headers for websockets and proper IP forwarding
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /public/ {
        # 'api-gateway' must match the service name in your docker-compose.yml
        proxy_pass http://api-gateway:3000;
        
        # Standard proxy headers for websockets and proper IP forwarding
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================
    # 2. React SPA Fallback
    # ==========================================
    # If the user navigates directly to a route like /appointments, 
    # Nginx will try to find a file. If it fails, it serves index.html so React can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # 3. Cache Busting (Crucial for React updates)
    # ==========================================
    # Prevents browsers from permanently caching the index.html file, 
    # ensuring users always get your latest deployed code.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}