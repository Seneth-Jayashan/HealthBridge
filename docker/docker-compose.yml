version: '3.8'

services:
  api-gateway:
    build: 
      context: ../api-gateway      
      dockerfile: Dockerfile
    container_name: healthbridge-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=super_secret_healthbridge_key_change_this_later
      - AUTH_SERVICE_URL=http://auth-service:3001
      - PATIENT_SERVICE_URL=http://patient-service:3002
      - DOCTOR_SERVICE_URL=http://doctor-service:3003
      - APPOINTMENT_SERVICE_URL=http://appointment-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - NOTIFICATION_SERVICE_URL=http://notification-service:3006
      - AI_SERVICE_URL=http://ai-service:3007
      - TELEMEDICINE_SERVICE_URL=http://telemedicine-service:3008
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - appointment-service
      - payment-service
      - notification-service
      - ai-service
      - telemedicine-service

  auth-service:
    build:
      context: ../            # Build from the root folder so it can see the 'shared' folder
      dockerfile: ./services/auth-service/Dockerfile
    container_name: healthbridge-auth
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=super_secret_healthbridge_key_change_this_later
      - MONGO_URI=mongodb+srv://HealthBridge_DB:Team_Health_Bridge_12@cluster0.d8ewy6i.mongodb.net/?appName=Cluster0
      - MONGO_DB_NAME=healthbridge_auth_db
      - INTERNAL_SERVICE_SECRET=healthbridge_internal_secret

  patient-service:
    build:
      context: ../
      dockerfile: ./services/patient-service/Dockerfile
    container_name: healthbridge-patient
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - JWT_SECRET=super_secret_healthbridge_key_change_this_later
      - MONGO_URI=mongodb+srv://HealthBridge_DB:Team_Health_Bridge_12@cluster0.d8ewy6i.mongodb.net/?appName=Cluster0
      - MONGO_DB_NAME=healthbridge_patient_db

  doctor-service:
    build:
      context: ../
      dockerfile: ./services/doctor-service/Dockerfile
    container_name: healthbridge-doctor
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - JWT_SECRET=super_secret_healthbridge_key_change_this_later
      - MONGO_URI=mongodb+srv://HealthBridge_DB:Team_Health_Bridge_12@cluster0.d8ewy6i.mongodb.net/?appName=Cluster0
      - MONGO_DB_NAME=healthbridge_doctor_db
      - NOTIFICATION_SERVICE_URL=http://notification-service:3006
      - AUTH_SERVICE_URL=http://auth-service:3001
      - INTERNAL_SERVICE_SECRET=healthbridge_internal_secret

  appointment-service:
    build:
      context: ../
      dockerfile: ./services/appointment-service/Dockerfile
    container_name: healthbridge-appointment
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - JWT_SECRET=super_secret_healthbridge_key_change_this_later
      - MONGO_URI=mongodb+srv://HealthBridge_DB:Team_Health_Bridge_12@cluster0.d8ewy6i.mongodb.net/?appName=Cluster0
      - MONGO_DB_NAME=healthbridge_appointment_db
      - DOCTOR_SERVICE_URL=http://doctor-service:3003
      - INTERNAL_SERVICE_SECRET=healthbridge_internal_secret
      - NOTIFICATION_SERVICE_URL=http://notification-service:3006
      - PATIENT_SERVICE_URL=http://patient-service:3002
      - TELEMEDICINE_SERVICE_URL=http://telemedicine-service:3008

  payment-service:
    build:
      context: ../
      dockerfile: ./services/payment-service/Dockerfile
    container_name: healthbridge-payment
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - JWT_SECRET=super_secret_healthbridge_key_change_this_later
      - MONGO_URI=mongodb+srv://HealthBridge_DB:Team_Health_Bridge_12@cluster0.d8ewy6i.mongodb.net/?appName=Cluster0
      - MONGO_DB_NAME=healthbridge_payment_db
      - AUTH_SERVICE_URL=http://auth-service:3001
      - DOCTOR_SERVICE_URL=http://doctor-service:3003
      - INTERNAL_SERVICE_SECRET=healthbridge_internal_secret
