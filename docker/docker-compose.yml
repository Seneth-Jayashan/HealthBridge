    container_name: healthbridge-ai
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
      - NODE_ENV=production
      - MONGO_URI=mongodb+srv://HealthBridge_DB:Team_Health_Bridge_12@cluster0.d8ewy6i.mongodb.net/?appName=Cluster0
      - JWT_SECRET=super_secret_healthbridge_key_change_this_later
      - GROQ_API_KEY=${GROQ_API_KEY}
      - AI_MODEL=llama-3.1-8b-instant

  telemedicine-service:
    build:
      context: ../
      dockerfile: ./services/telemedicine-service/Dockerfile
    container_name: healthbridge-telemedicine
    ports:
      - "3008:3008"
    environment:
